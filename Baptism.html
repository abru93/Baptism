<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baptism Invitation Generator</title>
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --primary-green: #527958;
            --text-muted: #888;
            --input-bg: #181818;
            --border-color: #333;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { text-align: center; font-weight: 300; letter-spacing: 2px; margin-bottom: 5px; }
        .subtitle { text-align: center; color: var(--text-muted); font-size: 0.8rem; margin-bottom: 30px; letter-spacing: 1px; }

        section { margin-bottom: 30px; }
        h3 { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }

        /* Selection Grids (Fonts, Colors, Patterns) */
        .grid-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; }
        .option-box {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .option-box.active { border: 2px solid #a8d5ba; background: #252525; }
        .color-circle { width: 100%; height: 60px; border-radius: 8px; }

        /* Form Layout */
        .form-group { margin-bottom: 15px; }
        .row { display: flex; gap: 15px; }
        .col { flex: 1; }
        
        label { display: block; font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
        label span { color: #e57373; }

        input, textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            color: white;
            box-sizing: border-box;
            font-size: 0.9rem;
        }

        textarea { height: 80px; resize: none; }

        .btn-generate {
            width: 100%;
            background: var(--primary-green);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 8px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
        }

        .btn-generate:hover { background: #5f8d66; }
    </style>
</head>
<body>

<div class="container">
    <h1>Baptism Invitation</h1>
    <p class="subtitle">CREATE YOUR SHAREABLE INVITE LINK</p>

    <!-- Style Selection -->
    <section>
        <h3>Font Style</h3>
        <div class="grid-options">
            <div class="option-box active"><i>Ag</i><br>EDITORIAL</div>
            <div class="option-box">Ag<br>CLASSIC</div>
            <div class="option-box" style="font-family: serif;">Ag<br>PLAYFAIR</div>
            <div class="option-box" style="font-variant: small-caps;">Ag<br>CINZEL</div>
            <div class="option-box">Ag<br>ROMANTIC</div>
        </div>
    </section>

    <section>
        <h3>Theme Color</h3>
        <div class="grid-options">
            <div class="color-circle" style="background: #527958;"></div>
            <div class="color-circle" style="background: #b67c84;"></div>
            <div class="color-circle" style="background: #28448d;"></div>
            <div class="color-circle" style="background: #900c27;"></div>
            <div class="color-circle" style="background: #222;"></div>
        </div>
    </section>

    <!-- Child & Family Details -->
    <section>
        <h3>Child & Parents' Details</h3>
        <div class="form-group">
            <label>Child's Name <span>*</span></label>
            <input type="text" placeholder="e.g. Gabriel Thomas">
        </div>
        <div class="row">
            <div class="col">
                <label>Father's Name <span>*</span></label>
                <input type="text" placeholder="e.g. John Doe">
            </div>
            <div class="col">
                <label>Mother's Name <span>*</span></label>
                <input type="text" placeholder="e.g. Jane Doe">
            </div>
        </div>
    </section>

    <!-- Event Details -->
    <section>
        <h3>Event Details</h3>
        <div class="row">
            <div class="col">
                <label>Date <span>*</span></label>
                <input type="date">
            </div>
            <div class="col">
                <label>Time <span>*</span></label>
                <input type="text" placeholder="e.g. 10:30 AM">
            </div>
        </div>
        <div class="form-group" style="margin-top: 15px;">
            <label>Church / Venue Name <span>*</span></label>
            <input type="text" placeholder="e.g. St. Mary's Cathedral">
        </div>
        <div class="form-group">
            <label>Venue Address</label>
            <input type="text" placeholder="e.g. Downtown, City Name">
        </div>
    </section>

    <!-- Personal Touch -->
    <section>
        <h3>Blessings & Personal Touch</h3>
        <div class="form-group">
            <label>Opening Verse / Quote (Optional)</label>
            <textarea placeholder="e.g. 'I have called you by name; you are mine.' - Isaiah 43:1"></textarea>
        </div>
    </section>

    <!-- Contact -->
    <section>
        <h3>Contact</h3>
        <div class="row">
            <div class="col">
                <label>RSVP Phone</label>
                <input type="text" placeholder="e.g. 9995558877">
            </div>
            <div class="col">
                <label>Google Maps URL</label>
                <input type="text" placeholder="https://maps.google.com/...">
            </div>
        </div>
    </section>

    <button class="btn-generate">Generate Invitation Link</button>
</div>

</body>
</html>
