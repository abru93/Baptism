<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baptism Invitation Generator</title>
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --primary-green: #527958;
            --text-muted: #888;
            --input-bg: #181818;
            --border-color: #333;
            --selection-glow: #a8d5ba;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { text-align: center; font-weight: 300; letter-spacing: 2px; margin-bottom: 5px; }
        .subtitle { text-align: center; color: var(--text-muted); font-size: 0.8rem; margin-bottom: 30px; letter-spacing: 1px; }

        section { margin-bottom: 30px; }
        h3 { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }

        /* Selection Grids */
        .grid-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; }
        
        .option-box {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.3s;
        }

        /* Logic for selection styling */
        .option-box.selected {
            border: 2px solid var(--selection-glow);
            background: #252525;
            box-shadow: 0 0 10px rgba(168, 213, 186, 0.2);
        }

        .color-circle { 
            width: 100%; 
            height: 60px; 
            border-radius: 8px; 
            cursor: pointer; 
            border: 2px solid transparent;
            box-sizing: border-box;
        }
        
        .color-circle.selected {
            border: 3px solid white;
            transform: scale(1.05);
        }

        /* Form Layout */
        .form-group { margin-bottom: 15px; }
        .row { display: flex; gap: 15px; }
        .col { flex: 1; }
        
        label { display: block; font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
        label span { color: #e57373; }

        input, textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            color: white;
            box-sizing: border-box;
            font-size: 0.9rem;
            outline: none;
        }
        input:focus { border-color: var(--primary-green); }

        .btn-generate {
            width: 100%;
            background: var(--primary-green);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 8px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-generate:hover { background: #5f8d66; transform: translateY(-2px); }
        .btn-generate:active { transform: translateY(0); }
    </style>
</head>
<body>

<div class="container">
    <h1>Baptism Invitation</h1>
    <p class="subtitle">CREATE YOUR SHAREABLE INVITE LINK</p>

    <!-- Font Style -->
    <section>
        <h3>Font Style</h3>
        <div class="grid-options" id="fontSelection">
            <div class="option-box selected" data-value="Editorial"><i>Ag</i><br>EDITORIAL</div>
            <div class="option-box" data-value="Classic">Ag<br>CLASSIC</div>
            <div class="option-box" data-value="Playfair" style="font-family: serif;">Ag<br>PLAYFAIR</div>
            <div class="option-box" data-value="Cinzel" style="font-variant: small-caps;">Ag<br>CINZEL</div>
            <div class="option-box" data-value="Romantic">Ag<br>ROMANTIC</div>
        </div>
    </section>

    <!-- Theme Color -->
    <section>
        <h3>Theme Color</h3>
        <div class="grid-options" id="colorSelection">
            <div class="color-circle selected" style="background: #527958;" data-color="#527958"></div>
            <div class="color-circle" style="background: #b67c84;" data-color="#b67c84"></div>
            <div class="color-circle" style="background: #28448d;" data-color="#28448d"></div>
            <div class="color-circle" style="background: #900c27;" data-color="#900c27"></div>
            <div class="color-circle" style="background: #222;" data-color="#222"></div>
        </div>
    </section>

    <section>
        <h3>Child & Parents' Details</h3>
        <div class="form-group">
            <label>Child's Name <span>*</span></label>
            <input type="text" id="childName" placeholder="e.g. Gabriel Thomas">
        </div>
        <div class="row">
            <div class="col">
                <label>Father's Name <span>*</span></label>
                <input type="text" id="fatherName" placeholder="e.g. John Doe">
            </div>
            <div class="col">
                <label>Mother's Name <span>*</span></label>
                <input type="text" id="motherName" placeholder="e.g. Jane Doe">
            </div>
        </div>
    </section>

    <section>
        <h3>Event Details</h3>
        <div class="row">
            <div class="col">
                <label>Date <span>*</span></label>
                <input type="date" id="eventDate">
            </div>
            <div class="col">
                <label>Time <span>*</span></label>
                <input type="text" id="eventTime" placeholder="e.g. 10:30 AM">
            </div>
        </div>
        <div class="form-group" style="margin-top: 15px;">
            <label>Church Name <span>*</span></label>
            <input type="text" id="venueName" placeholder="e.g. St. Mary's Cathedral">
        </div>
    </section>

    <button class="btn-generate" onclick="generateInvite()">Generate Invitation Link</button>
</div>

<script>
    // --- 1. Selection Logic for Fonts ---
    const fontBoxes = document.querySelectorAll('#fontSelection .option-box');
    fontBoxes.forEach(box => {
        box.addEventListener('click', () => {
            fontBoxes.forEach(b => b.classList.remove('selected'));
            box.classList.add('selected');
        });
    });

    // --- 2. Selection Logic for Colors ---
    const colorCircles = document.querySelectorAll('#colorSelection .color-circle');
    colorCircles.forEach(circle => {
        circle.addEventListener('click', () => {
            colorCircles.forEach(c => c.classList.remove('selected'));
            circle.classList.add('selected');
            
            // Update the main button color to match the theme
            document.querySelector('.btn-generate').style.background = circle.dataset.color;
        });
    });

    // --- 3. Generate Logic ---
    function generateInvite() {
        const name = document.getElementById('childName').value;
        const selectedFont = document.querySelector('#fontSelection .selected').dataset.value;
        const selectedColor = document.querySelector('#colorSelection .selected').dataset.color;

        if (!name) {
            alert("Please enter the child's name!");
            return;
        }

        // Simulating the generation process
        const button = document.querySelector('.btn-generate');
        button.innerText = "GENERATING...";
        button.disabled = true;

        setTimeout(() => {
            alert(`Success! Invitation generated for ${name}.\nFont: ${selectedFont}\nColor: ${selectedColor}\n\nLink: https://invites.example.com/baptism-${name.replace(/\s+/g, '-').toLowerCase()}`);
            button.innerText = "GENERATE INVITATION LINK";
            button.disabled = false;
        }, 1500);
    }
</script>

</body>
</html>
